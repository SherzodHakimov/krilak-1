<section class="bg-brand-graphite text-white relative overflow-hidden -mt-[7.25rem] pt-[7.25rem]">
  <div class="absolute inset-0 grid-lines opacity-[0.06] pointer-events-none"></div>
  <div class="container-x relative py-16 lg:py-20">
    <app-breadcrumbs [items]="crumbs" />
    <span class="eyebrow !text-brand-amber">{{ 'nav.services' | t }}</span>
    <h1 class="text-display-lg text-white text-balance mt-3">{{ 'services.title' | t }}</h1>
    <p class="text-lg text-white/70 mt-5 max-w-2xl">{{ 'services.subtitle' | t }}</p>
  </div>
</section>

<section class="section">
  <div class="container-x grid lg:grid-cols-2 gap-6">
    @for (item of items; track item.key; let i = $index) {
      <article class="card-bordered p-8 group" data-reveal [attr.data-reveal-delay]="(i % 2) * 60">
        <div class="flex items-start justify-between gap-4 mb-5">
          <span class="w-12 h-12 rounded-xl bg-brand-spring text-brand-leaf grid place-items-center shrink-0">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path [attr.d]="item.icon" /></svg>
          </span>
          <span class="text-xl font-mono font-semibold text-brand-ink/30">{{ item.n }}</span>
        </div>
        <h2 class="font-display font-bold text-2xl group-hover:text-brand-leaf transition-colors">{{ 'services.items.' + item.key + '.title' | t }}</h2>
        <p class="text-brand-ink/70 mt-3">{{ 'services.items.' + item.key + '.description' | t }}</p>
      </article>
    }
  </div>
</section>

<app-cta-section leadTitle="KRILAK — заявка (Услуги)" source="/services" />
