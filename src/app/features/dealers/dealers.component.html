<app-page-hero
  eyebrow="dealers.eyebrow"
  title="dealers.title"
  subtitle="dealers.subtitle"
  [crumbs]="crumbs"
/>

<section class="section">
  <div class="container-x grid lg:grid-cols-2 gap-12 items-start">
    <!-- Benefits -->
    <div data-reveal>
      <h2 class="text-display-md text-balance">{{ 'dealers.benefits_title' | t }}</h2>
      <ul class="mt-8 space-y-4">
        @for (b of benefits(); track b) {
          <li class="flex items-start gap-4">
            <span class="w-7 h-7 rounded-full bg-brand-leaf/15 text-brand-leaf grid place-items-center text-sm mt-0.5 shrink-0">✓</span>
            <span class="text-brand-ink/80">{{ b }}</span>
          </li>
        }
      </ul>
    </div>

    <!-- Form -->
    <div data-reveal data-reveal-delay="120">
      <app-lead-form
        [fields]="dealerFields"
        submitLabelKey="dealers.submit"
        leadTitle="KRILAK — заявка на партнёрство"
        source="/dealers"
      >
        <h2 class="font-display font-bold text-xl">{{ 'dealers.form_title' | t }}</h2>
      </app-lead-form>
    </div>
  </div>
</section>
