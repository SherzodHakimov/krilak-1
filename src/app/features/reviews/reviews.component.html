<app-page-hero eyebrow="reviews.eyebrow" title="reviews.title" subtitle="reviews.subtitle" />

<section class="section">
  <div class="container-x">
    <div class="grid md:grid-cols-2 gap-5">
      @for (r of reviews(); track r.author + r.role; let i = $index) {
        <figure class="card-bordered p-8" data-reveal [attr.data-reveal-delay]="(i % 2) * 80">
          <div class="text-5xl text-brand-leaf/30 font-display leading-none">“</div>
          <blockquote class="text-lg text-brand-graphite -mt-4">{{ r.text }}</blockquote>
          <figcaption class="mt-6 pt-6 border-t border-brand-fog">
            <div class="font-display font-semibold">{{ r.author }}</div>
            <div class="text-sm text-brand-ink/60">{{ r.role }}</div>
          </figcaption>
        </figure>
      }
    </div>
  </div>
</section>
