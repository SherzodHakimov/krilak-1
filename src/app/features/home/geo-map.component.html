<div class="relative w-full" (mouseleave)="active.set(null)">
  <div class="rounded-3xl bg-white overflow-hidden px-5 sm:px-7 py-10 sm:py-14">
   <div class="relative">
    <svg [attr.viewBox]="viewBox" class="block w-full h-auto" role="img" [attr.aria-label]="'geo.map_aria' | t">
      <!-- базовый слой округов (хороплет) -->
      @for (d of districts(); track d.id) {
        <path
          class="okrug"
          [attr.d]="d.d"
          [attr.fill]="d.fill"
          stroke="#fff"
          stroke-width="1.6"
          stroke-linejoin="round"
          fill-rule="evenodd"
          (mouseenter)="active.set(d.id)"
          (click)="active.set(d.id)"
        >
          <title>{{ d.name }} — {{ d.countLabel }}</title>
        </path>
      }
      <!-- постоянные счётчики -->
      @for (d of districts(); track d.id) {
        <text
          class="okrug-count"
          [class.okrug-count--hidden]="active() === d.id"
          [attr.x]="d.cx"
          [attr.y]="d.cy"
          text-anchor="middle"
          dominant-baseline="central"
          >{{ d.countLabel }}</text
        >
      }
      <!-- активный округ поверх + анимация увеличения -->
      @if (activeDistrict(); as a) {
        <path class="okrug-active" [attr.d]="a.d" fill="#5DAA2F" stroke="#fff" stroke-width="1.6" stroke-linejoin="round" fill-rule="evenodd"></path>
        <text
          class="okrug-count okrug-count--active"
          [attr.x]="a.cx"
          [attr.y]="a.cy"
          text-anchor="middle"
          dominant-baseline="central"
          >{{ a.countLabel }}</text
        >
      }
    </svg>

    <!-- всплывающая карточка с названием округа -->
    @if (activeDistrict(); as a) {
      <div
        class="pointer-events-none absolute z-10 -translate-x-1/2 -translate-y-[140%]"
        [style.left.%]="a.leftPct"
        [style.top.%]="a.topPct"
      >
        <div class="bg-white rounded-xl shadow-card-hover border border-brand-fog px-3.5 py-2 whitespace-nowrap text-center">
          <div class="text-sm font-semibold text-brand-graphite">{{ a.name }}</div>
          <div class="text-xs text-brand-leaf font-bold">{{ a.countLabel }} {{ 'map.objects_unit' | t }}</div>
        </div>
      </div>
    }
   </div>
  </div>

  <p class="mt-3 text-xs text-brand-ink/55 flex items-center gap-2">
    <span class="inline-block w-2 h-2 rounded-full bg-brand-leaf shrink-0"></span>
    {{ activeDistrict() ? activeDistrict()!.name : ('map.districts_hint' | t) }}
  </p>
</div>
