<app-page-hero
  eyebrow="news.title"
  title="news.heading"
  subtitle="news.subtitle"
  [crumbs]="crumbs"
/>

<section class="section">
  <div class="container-x">
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (a of articles(); track a.slug; let i = $index) {
        <a [routerLink]="'/news/' + a.slug | loc" class="card-bordered overflow-hidden group block" data-reveal [attr.data-reveal-delay]="(i % 3) * 80">
          <div class="h-44 relative overflow-hidden bg-white">
            @if (a.photo) {
              <img
                [ngSrc]="a.photo"
                [alt]="a.title"
                fill
                sizes="(min-width: 1024px) 33vw, (min-width: 768px) 50vw, 100vw"
                class="object-cover transition-transform duration-700 group-hover:scale-105"
              />
            }
            <div class="absolute inset-0 bg-gradient-to-br mix-blend-multiply {{ newsGradient(a.accent) }}"></div>
            <span class="absolute inset-x-0 top-0 h-20 bg-gradient-to-b from-black/35 to-transparent pointer-events-none"></span>
            <span class="absolute top-4 left-4 pill opacity-90 shadow-md ring-1 ring-black/10 {{ newsPill(a.accent) }}">{{ a.category }}</span>
          </div>
          <div class="p-6">
            <time class="text-xs text-brand-ink/50 font-medium">{{ a.date | dmy }}</time>
            <h2 class="font-display font-bold text-lg mt-2 group-hover:text-brand-leaf transition-colors">{{ a.title }}</h2>
            <p class="text-sm text-brand-ink/70 mt-3 line-clamp-2">{{ a.excerpt }}</p>
            <span class="link-arrow mt-4 text-sm">{{ 'news.read' | t }}</span>
          </div>
        </a>
      }
    </div>
  </div>
</section>
