<section class="bg-brand-graphite text-white relative overflow-hidden -mt-[7.25rem] pt-[7.25rem]">
  <div class="absolute inset-0 grid-lines opacity-[0.05] pointer-events-none"></div>
  <div class="container-x relative py-16 lg:py-24">
    <div class="max-w-3xl" data-reveal>
      <span class="eyebrow !text-brand-amber">{{ 'news.title' | t }}</span>
      <h1 class="mt-3 text-display-lg text-white text-balance">{{ 'news.title' | t }}</h1>
      <p class="mt-5 text-lg text-white/70">{{ 'news.subtitle' | t }}</p>
    </div>
  </div>
</section>

<section class="section">
  <div class="container-x">
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (a of articles(); track a.slug; let i = $index) {
        <a [routerLink]="'/news/' + a.slug | loc" class="card-bordered overflow-hidden group block" data-reveal [attr.data-reveal-delay]="(i % 3) * 80">
          <div class="h-44 bg-gradient-to-br relative {{ a.accent === 'leaf' ? 'from-brand-leaf/20 to-brand-amber/20' : a.accent === 'steel' ? 'from-brand-steel/20 to-brand-graphite/20' : 'from-emerald-500/20 to-brand-graphite/20' }}">
            <span class="absolute top-4 left-4 pill-{{ a.accent }}">{{ a.category }}</span>
          </div>
          <div class="p-6">
            <time class="text-xs text-brand-ink/50 font-medium">{{ a.date }}</time>
            <h2 class="font-display font-bold text-lg mt-2 group-hover:text-brand-leaf transition-colors">{{ a.title }}</h2>
            <p class="text-sm text-brand-ink/60 mt-3 line-clamp-3">{{ a.excerpt }}</p>
            <span class="link-arrow mt-5 text-sm">{{ 'news.read' | t }}</span>
          </div>
        </a>
      }
    </div>
  </div>
</section>
