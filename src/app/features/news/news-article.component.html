@if (article(); as a) {
  <article>
    <header class="bg-brand-graphite text-white relative overflow-hidden -mt-[7.25rem] pt-[7.25rem]">
      <div class="absolute inset-0 grid-lines opacity-[0.05] pointer-events-none"></div>
      <div class="container-x max-w-3xl relative py-16 lg:py-20">
        <app-breadcrumbs [items]="crumbs()" />
        <a [routerLink]="'/news' | loc" class="text-sm text-brand-amber font-semibold hover:gap-2 inline-flex items-center gap-1" data-reveal>← {{ 'news.back' | t }}</a>
        <div class="mt-6 flex items-center gap-3" data-reveal>
          <span class="pill opacity-90 ring-1 ring-white/15 {{ a.accent === 'leaf' ? 'bg-brand-leaf text-white' : a.accent === 'steel' ? 'bg-brand-steel text-white' : 'bg-brand-amber text-brand-graphite' }}">{{ a.category }}</span>
          <time class="text-sm text-white/50">{{ a.date | dmy }}</time>
        </div>
        <h1 class="mt-4 text-display-lg text-white text-balance" data-reveal>{{ a.title }}</h1>
        <p class="mt-5 text-lg text-white/70" data-reveal>{{ a.excerpt }}</p>
      </div>
    </header>
    <div class="section">
      <div class="container-x max-w-3xl">
        <div class="prose prose-lg max-w-none text-brand-ink/80" data-reveal>
          @for (para of a.body; track $index) {
            <p class="mb-5 leading-relaxed">{{ para }}</p>
          }
        </div>
        <div class="mt-12 pt-8 border-t border-brand-fog flex flex-wrap gap-3" data-reveal>
          <a [routerLink]="'/configurator' | loc" class="btn-primary">{{ 'configurator_block.cta' | t }}</a>
          <a [routerLink]="'/contacts' | loc" class="btn-secondary">{{ 'nav.contacts' | t }}</a>
        </div>
      </div>
    </div>
  </article>
} @else {
  <section class="bg-brand-graphite text-white relative overflow-hidden -mt-[7.25rem] pt-[7.25rem]">
    <div class="absolute inset-0 grid-lines opacity-[0.05] pointer-events-none"></div>
    <div class="container-x text-center relative py-24 lg:py-32">
      <h1 class="text-display-md text-white">{{ 'notfound.title' | t }}</h1>
      <a [routerLink]="'/news' | loc" class="btn-primary mt-8">{{ 'news.back' | t }}</a>
    </div>
  </section>
}
